# Local Variables
$BACKGROUND_PATH = $HOME/.cache/hyprlock/moon_tinted.png
$fontFamily = SF Pro Display, JetBrainsMono Nerd Font
source = colors.conf
# $fn_greet=echo "Good $(date +%H | awk '{if ($1 < 12) print "Morning"; else if ($1 < 18) print "Afternoon"; else print "Evening"}'), ${USER}"

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    fractional_scaling = 2
    hide_cursor = true
    ignore_empty_input = true
}

# BACKGROUND
background {
    monitor =
    path = $BACKGROUND_PATH
    blur_passes = 2
}

# TIME (Top of stack)
label {
  monitor = eDP-1
  text = cmd[update:1000] ~/.config/hypr/scripts/time.sh
  color = $primary
  font_size = 350
  font_family = $fontFamily
  position = 60, 6%
  halign = center
  valign = center
}

label {
  monitor = HDMI-A-1
  text = cmd[update:1000] ~/.config/hypr/scripts/time.sh
  color = $primary
  font_size = 200
  font_family = $fontFamily
  position = 60, 6%
  halign = center
  valign = center
}

# DATE (Below time)
label {
  monitor =
  text = cmd[update:43200000] ~/.config/hypr/scripts/date.sh
  color = $primary
  font_size = 25
  font_family = $fontFamily
  position = 0, -8%
  halign = center
  valign = center
}

# INPUT FIELD (Below date)
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3

    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    inner_color = $background
    font_color = $primary

    fade_on_empty = true
    fade_timeout = 1000

    hide_input = false
    rounding = -1

    check_color = $primary
    fail_color = rgba(FF0000FF)
    fail_text = <b>$FAIL <b>($ATTEMPTS)</b></b>
    fail_transition = 300

    swap_font_color = true

    position = 0, -14%
    halign = center
    valign = center
}

# CURRENT SONG
label {
   monitor =
   text = cmd[update:1000] ~/.config/hypr/scripts/songdetail.sh
   color = $primary
   font_size = 30
   font_family = $fontFamily
   position = 0, -20%
   # halign = center
   # valign = center
}
